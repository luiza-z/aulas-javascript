<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <!-- Responsive Meta Tag -->
    <meta name="viewport" content=" width=device-width, initial-scale=1.0"> 
    <link rel="icon" type="image/png" href="../favicon.png">
    <title>AULA 01 JAVASCRIPT</title>
    <meta name="description" content="Aplicação para..;">
    <meta name="keywords" content="Aplicação para..;">
    <meta name="author" content="Aplicação para..;">
</head>

<body>
    <h1>Solicitando confirmação para o usuário: CONFIRM</h1>
    <hr>
    <script>
        window.alert("Seja bem vindo ao site");
        let nome = window.prompt("QUAL È O SEU NOME?")
        window.alert(nome);
        console.log(nome);
        let resposta = window.confirm("Você deseja sair da página?")
        console.log(resposta);
        document.write("SEJA BEM-VINDO "+ nome);

        if(resposta==true){
            setTimeout(() => {
                window.open("index.html");
            }, 3000); // 3000 milisseundos = 3 segundos

        }else{
            window.confirm(nome + ", você vai continuar nessa página/!")
        }
    
    </script>
    
</body>

</html>
